name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r run --if-present build

      - name: Upgrade npm for OIDC trusted publishing
        # OIDC trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x.
        # Without this, `changeset publish` uses the old npm + a token that
        # 404s on the @tangle-network scope. Mirrors sandbox-ui's working job.
        # Pinned (not @latest): npm 12.0.0 (2026-07-08) broke `--provenance` with
        # "MODULE_NOT_FOUND: Cannot find module 'sigstore'". 11.18.0 is the last
        # known-good release. Revisit once a fixed npm 12.x ships.
        run: npm install -g npm@11.18.0

      - name: Force OIDC auth (strip empty npm token line)
        # setup-node writes a `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`
        # line into the npm userconfig it points NPM_CONFIG_USERCONFIG at
        # (/home/runner/work/_temp/.npmrc) — NOT just ~/.npmrc. With no
        # NODE_AUTH_TOKEN the token expands empty, so `changeset publish`
        # attempts (failing) token auth and 404s on the @tangle-network scope
        # instead of falling back to OIDC trusted publishing. Strip the line
        # from every npmrc npm might read so it authenticates via OIDC.
        run: |
          for f in "$HOME/.npmrc" "${NPM_CONFIG_USERCONFIG:-}" "$RUNNER_TEMP/.npmrc" "$GITHUB_WORKSPACE/.npmrc"; do
            if [ -n "$f" ] && [ -f "$f" ]; then
              sed -i '/_authToken=/d' "$f" || true
              echo "stripped _authToken from $f"
            fi
          done

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: release"
          title: "chore: release"
        # No NODE_AUTH_TOKEN: with `id-token: write` + a configured npm trusted
        # publisher for @tangle-network/brand and @tangle-network/ui, npm
        # authenticates the publish via OIDC. A token here forces token auth,
        # which 404s on this scope (see sandbox-ui's release.yml note).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Configure npm for GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@tangle-network"

      - name: Publish to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | [.name, .version] | @tsv' \
            | while IFS=$'\t' read -r name version; do
                dir="packages/${name#@tangle-network/}"
                echo "Publishing $name@$version from $dir to GitHub Packages"
                (cd "$dir" && npm publish)
              done
