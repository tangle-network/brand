name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r run --if-present build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Publish to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cat > .npmrc <<EOF
          @tangle-network:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          EOF
          echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | [.name, .version] | @tsv' \
            | while IFS=$'\t' read -r name version; do
                dir="packages/${name#@tangle-network/}"
                echo "Publishing $name@$version from $dir to GitHub Packages"
                (cd "$dir" && npm publish)
              done

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '${{ steps.changesets.outputs.publishedPackages }}' \
            | jq -r '.[] | "\(.name)@\(.version)"' \
            | while read -r tag; do
                version="${tag##*@}"
                gh release create "v${version}" --generate-notes --title "${tag}" || true
              done
